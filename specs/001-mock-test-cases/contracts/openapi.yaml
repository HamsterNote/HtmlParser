openapi: 3.0.3
info:
  title: Mock Test Case Generation API
  version: 0.1.0
servers:
  - url: http://localhost
security: []
paths:
  /mock-configs:
    post:
      summary: Create mock data configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockDataConfigInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockDataConfig'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List mock data configurations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MockDataConfig'
  /mock-configs/{configId}:
    get:
      summary: Get mock data configuration
      parameters:
        - in: path
          name: configId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockDataConfig'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mock-configs/{configId}/validate:
    post:
      summary: Validate mock data configuration
      parameters:
        - in: path
          name: configId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '409':
          description: Constraint conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictDiagnostic'
  /mock-datasets:
    post:
      summary: Generate mock dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateDatasetRequest'
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockDataset'
        '409':
          description: Constraint conflicts or sensitive fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictDiagnostic'
  /coverage-reports:
    post:
      summary: Create coverage report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoverageReportRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverageReport'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MockDataConfigInput:
      type: object
      required: [name, version, seed, targetModule, fields, generationParams]
      properties:
        name:
          type: string
        version:
          type: string
        seed:
          type: string
        targetModule:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldConstraint'
        generationParams:
          $ref: '#/components/schemas/GenerationParams'
        sensitiveFieldPolicy:
          type: string
          enum: [reject]
    MockDataConfig:
      allOf:
        - $ref: '#/components/schemas/MockDataConfigInput'
        - type: object
          required: [id, status, createdAt, updatedAt]
          properties:
            id:
              type: string
            status:
              type: string
              enum: [draft, active, archived]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    FieldConstraint:
      type: object
      required: [fieldName, type, required, nullable]
      properties:
        fieldName:
          type: string
        type:
          type: string
          enum: [string, number, boolean, date, enum, object, array]
        required:
          type: boolean
        nullable:
          type: boolean
        range:
          $ref: '#/components/schemas/NumberRange'
        length:
          $ref: '#/components/schemas/NumberRange'
        pattern:
          type: string
        allowedValues:
          type: array
          items:
            oneOf:
              - type: string
              - type: number
        boundaryValues:
          type: array
          items: {}
        exceptionValues:
          type: array
          items: {}
        relations:
          type: array
          items:
            $ref: '#/components/schemas/RelationConstraint'
    NumberRange:
      type: object
      properties:
        min:
          type: number
        max:
          type: number
    RelationConstraint:
      type: object
      required: [type, left, right, message]
      properties:
        type:
          type: string
          enum: [equals, notEquals, greaterThan, lessThan, in, custom]
        left:
          type: string
        right:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: number
        message:
          type: string
    GenerationParams:
      type: object
      required: [sampleCount, includeBoundarySamples, includeExceptionSamples]
      properties:
        sampleCount:
          type: integer
          minimum: 1
        includeBoundarySamples:
          type: boolean
        includeExceptionSamples:
          type: boolean
        maxDurationSeconds:
          type: integer
          minimum: 1
        configVersioning:
          type: boolean
    GenerateDatasetRequest:
      type: object
      required: [configId]
      properties:
        configId:
          type: string
        overrideSeed:
          type: string
    MockDataset:
      type: object
      required: [id, configId, configVersion, seed, samples, stats, generatedAt]
      properties:
        id:
          type: string
        configId:
          type: string
        configVersion:
          type: string
        seed:
          type: string
        samples:
          type: array
          items:
            $ref: '#/components/schemas/MockSample'
        stats:
          $ref: '#/components/schemas/DatasetStats'
        generatedAt:
          type: string
          format: date-time
    MockSample:
      type: object
      required: [id, payload, tags, valid, violations]
      properties:
        id:
          type: string
        payload:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
            enum: [boundary, exception, normal]
        valid:
          type: boolean
        violations:
          type: array
          items:
            type: string
    DatasetStats:
      type: object
      required: [total, validCount, invalidCount, boundaryCount, exceptionCount, constraintPassRate]
      properties:
        total:
          type: integer
        validCount:
          type: integer
        invalidCount:
          type: integer
        boundaryCount:
          type: integer
        exceptionCount:
          type: integer
        constraintPassRate:
          type: number
          minimum: 0
          maximum: 1
    CoverageReportRequest:
      type: object
      required: [configId, baseline, current, uncoveredBranches]
      properties:
        configId:
          type: string
        baseline:
          $ref: '#/components/schemas/CoverageSnapshot'
        current:
          $ref: '#/components/schemas/CoverageSnapshot'
        uncoveredBranches:
          type: array
          items:
            $ref: '#/components/schemas/UncoveredBranch'
    CoverageReport:
      type: object
      required: [id, configId, baseline, current, delta, uncoveredBranches, generatedAt]
      properties:
        id:
          type: string
        configId:
          type: string
        baseline:
          $ref: '#/components/schemas/CoverageSnapshot'
        current:
          $ref: '#/components/schemas/CoverageSnapshot'
        delta:
          $ref: '#/components/schemas/CoverageDelta'
        uncoveredBranches:
          type: array
          items:
            $ref: '#/components/schemas/UncoveredBranch'
        generatedAt:
          type: string
          format: date-time
    CoverageSnapshot:
      type: object
      required: [branchCoverage, statementCoverage, functionCoverage, lineCoverage]
      properties:
        branchCoverage:
          type: number
        statementCoverage:
          type: number
        functionCoverage:
          type: number
        lineCoverage:
          type: number
    CoverageDelta:
      type: object
      required: [branchDelta, statementDelta, functionDelta, lineDelta]
      properties:
        branchDelta:
          type: number
        statementDelta:
          type: number
        functionDelta:
          type: number
        lineDelta:
          type: number
    UncoveredBranch:
      type: object
      required: [filePath, branchId, line, summary]
      properties:
        filePath:
          type: string
        branchId:
          type: string
        line:
          type: integer
        summary:
          type: string
    ValidationResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
    ConflictDiagnostic:
      type: object
      required: [id, configId, conflicts, generatedAt]
      properties:
        id:
          type: string
        configId:
          type: string
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintConflict'
        generatedAt:
          type: string
          format: date-time
    ConstraintConflict:
      type: object
      required: [fieldName, reason, details]
      properties:
        fieldName:
          type: string
        reason:
          type: string
        details:
          type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
